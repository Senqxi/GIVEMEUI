name: Bug report
description: Report something that is broken or unsafe.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug. Do not include secrets, tokens, or private command output.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include the command schema or CLI help text if it is safe to share.
      placeholder: |
        1. Run `givemeui`
        2. Discover `tool --help`
        3. Click ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: GIVEMEUI version or commit
      placeholder: 0.1.0 or commit SHA
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Discovery/parser
        - Generated UI
        - Schema editor
        - Command runner
        - Output console
        - CLI packaging
        - Documentation
        - Other
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, browser, and terminal shell.
      placeholder: macOS 15, Node 22, Chrome, zsh
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove secrets and private paths before posting.
