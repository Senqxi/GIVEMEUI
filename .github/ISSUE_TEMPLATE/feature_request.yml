name: Feature request
description: Suggest a capability or improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI discovery
        - Generated UI
        - Schema editing
        - Command execution
        - Output understanding
        - Tool adapter
        - Packaging/install
        - Local AI
        - Other
  - type: textarea
    id: examples
    attributes:
      label: Example CLIs or workflows
      description: Include commands, tools, or help output examples if useful.
